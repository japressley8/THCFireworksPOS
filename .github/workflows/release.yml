name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build and Sign Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSPHRASE: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSPHRASE }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'THC Fireworks v__VERSION__'
          releaseBody: 'See the full changelog below.'
          releaseDraft: false
          prerelease: ${{ contains(github.ref, '-pre') || contains(github.ref, '-rc') }}
          createUpdaterArtifacts: true

      # -------------------------------------------------------------------------
      # Asset Curation
      # Tauri v2 createUpdaterArtifacts signs the installer .exe directly,
      # producing:  THC_Fireworks_<ver>_x64-setup.exe
      #             THC_Fireworks_<ver>_x64-setup.exe.sig
      #
      # This step:
      #   1. Renames the exe to THC_Fireworks.exe and uploads it
      #   2. Reads the minisign signature from the .exe.sig file
      #   3. Generates updater.json (Tauri v2 updater manifest)
      #   4. Cleans up unwanted release assets
      #
      # Final release contains exactly 2 files:
      #   THC_Fireworks.exe  - signed NSIS installer (downloaded by Tauri updater)
      #   updater.json       - Tauri v2 updater manifest
      # -------------------------------------------------------------------------
      - name: Curate Release Assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          $tag     = "${{ github.ref_name }}"
          $repo    = "${{ github.repository }}"

          # --- Diagnostic: show everything in the bundle directory ---
          Write-Host "=== Bundle directory contents ==="
          Get-ChildItem -Path src-tauri/target/release/bundle -Recurse |
            Select-Object FullName | Format-Table -AutoSize
          Write-Host "================================="

          # Tauri v2 createUpdaterArtifacts produces:
          #   THC_Fireworks_<ver>_x64-setup.exe
          #   THC_Fireworks_<ver>_x64-setup.exe.sig
          # Use Where-Object (not -Filter) so multi-extension names match correctly.
          $nsisExe = Get-ChildItem -Path src-tauri/target/release/bundle -Recurse |
                       Where-Object { $_.Name -like "*_x64-setup.exe" -and $_.Name -notlike "*.sig" } |
                       Select-Object -First 1
          $sigFile = Get-ChildItem -Path src-tauri/target/release/bundle -Recurse |
                       Where-Object { $_.Name -like "*_x64-setup.exe.sig" } |
                       Select-Object -First 1

          if ($null -eq $nsisExe -or $null -eq $sigFile) {
            Write-Error "ERROR: Could not find _x64-setup.exe or _x64-setup.exe.sig in the build output."
            exit 1
          }

          Write-Host "Installer : $($nsisExe.FullName)"
          Write-Host "Sig file  : $($sigFile.FullName)"

          # Read the detached minisign signature
          $signature = (Get-Content -Path $sigFile.FullName -Raw).Trim()

          # Upload THC_Fireworks.exe (clean name for the Tauri updater to download)
          Copy-Item -Path $nsisExe.FullName -Destination "THC_Fireworks.exe"
          gh release upload $tag "THC_Fireworks.exe" --clobber
          Write-Host "Uploaded THC_Fireworks.exe"

          # Generate updater.json  (Tauri v2 updater manifest schema)
          $pubDate   = (Get-Date -AsUTC -Format "yyyy-MM-ddTHH:mm:ssZ")
          $updateUrl = "https://github.com/$repo/releases/download/$tag/THC_Fireworks.exe"

          $manifest = [ordered]@{
            version  = $version
            notes    = "See the full changelog at https://github.com/$repo/releases/tag/$tag"
            pub_date = $pubDate
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = $signature
                url       = $updateUrl
              }
            }
          }

          $manifest | ConvertTo-Json -Depth 5 |
            Out-File -FilePath "updater.json" -Encoding utf8NoBOM
          gh release upload $tag "updater.json" --clobber
          Write-Host "Uploaded updater.json"

          # Remove all unwanted release assets (raw Tauri output)
          $toDelete = @(
            $nsisExe.Name,
            $sigFile.Name,
            "THC_Fireworks_Portable.exe",
            "THC_Fireworks_Portable.zip",
            "godaddy-bridge.zip"
          )

          foreach ($asset in $toDelete) {
            Write-Host "Removing asset (if present): $asset"
            gh release delete-asset $tag $asset --yes 2>$null
          }

          Write-Host "Release curation complete. Final assets: THC_Fireworks.exe, updater.json"

