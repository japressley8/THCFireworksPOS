name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      # ── Pass 1: NSIS installer (used by auto-updater) ──────────────────────
      - name: Build and Sign Tauri App (NSIS installer)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSPHRASE: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSPHRASE }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'THC Fireworks v__VERSION__'
          releaseBody: 'See the full changelog below.'
          releaseDraft: false
          prerelease: ${{ contains(github.ref, '-pre') || contains(github.ref, '-rc') }}
          createUpdaterArtifacts: true

      # ── Pass 2: portable exe (no installer, run from USB) ──────────────────
      - name: Build Portable Exe
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSPHRASE: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSPHRASE }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: npm run tauri build -- --no-bundle

      # ── Asset Curation ─────────────────────────────────────────────────────
      # Produces exactly 3 release assets:
      #   THC_Fireworks_Setup.exe    — NSIS installer  (auto-updater downloads this)
      #   THC_Fireworks_Portable.exe — raw exe         (USB / no-install users)
      #   updater.json               — Tauri v2 updater manifest
      # -----------------------------------------------------------------------
      - name: Curate Release Assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          $tag     = "${{ github.ref_name }}"
          $repo    = "${{ github.repository }}"

          # --- Diagnostic: show what was built ---
          Write-Host "=== Bundle directory contents ==="
          Get-ChildItem -Path src-tauri/target/release/bundle -Recurse |
            Select-Object FullName | Format-Table -AutoSize
          Write-Host "==================================="
          Write-Host "=== Release directory (top-level exes) ==="
          Get-ChildItem -Path src-tauri/target/release -Filter "*.exe" |
            Select-Object Name | Format-Table -AutoSize
          Write-Host "==========================================="

          # ── Locate NSIS installer + its signature ──
          # Use Where-Object (not -Filter) so multi-extension names match on Windows.
          $nsisExe = Get-ChildItem -Path src-tauri/target/release/bundle -Recurse |
                       Where-Object { $_.Name -like "*_x64-setup.exe" -and $_.Name -notlike "*.sig" } |
                       Select-Object -First 1
          $sigFile = Get-ChildItem -Path src-tauri/target/release/bundle -Recurse |
                       Where-Object { $_.Name -like "*_x64-setup.exe.sig" } |
                       Select-Object -First 1

          if ($null -eq $nsisExe -or $null -eq $sigFile) {
            Write-Error "ERROR: Could not find _x64-setup.exe or _x64-setup.exe.sig in the build output."
            exit 1
          }

          # ── Locate portable exe (produced by --no-bundle build) ──
          # --no-bundle outputs the raw binary directly to target/release/
          $portableExe = Get-ChildItem -Path src-tauri/target/release |
                           Where-Object { ($_.Name -eq "THC_Fireworks.exe" -or $_.Name -eq "fireworks-pos-app.exe") -and !$_.PSIsContainer } |
                           Select-Object -First 1

          Write-Host "Installer   : $($nsisExe.FullName)"
          Write-Host "Sig file    : $($sigFile.FullName)"
          Write-Host "Portable exe: $(if ($portableExe) { $portableExe.FullName } else { '(not found - check binary name)' })"

          # Read the detached minisign signature
          $signature = (Get-Content -Path $sigFile.FullName -Raw).Trim()

          # ── Upload THC_Fireworks_Setup.exe (auto-updater target) ──
          Copy-Item -Path $nsisExe.FullName -Destination "THC_Fireworks_Setup.exe"
          gh release upload $tag "THC_Fireworks_Setup.exe" --clobber
          Write-Host "Uploaded THC_Fireworks_Setup.exe"

          # ── Upload THC_Fireworks_Portable.exe (USB / no-install users) ──
          if ($portableExe) {
            Copy-Item -Path $portableExe.FullName -Destination "THC_Fireworks_Portable.exe"
            gh release upload $tag "THC_Fireworks_Portable.exe" --clobber
            Write-Host "Uploaded THC_Fireworks_Portable.exe"
          } else {
            Write-Warning "Portable exe not found - skipping. Check Cargo.toml binary name."
          }

          # ── Generate updater.json (Tauri v2 updater manifest) ──
          # Points to THC_Fireworks_Setup.exe so the NSIS installer runs silently.
          $pubDate   = (Get-Date -AsUTC -Format "yyyy-MM-ddTHH:mm:ssZ")
          $updateUrl = "https://github.com/$repo/releases/download/$tag/THC_Fireworks_Setup.exe"

          $manifest = [ordered]@{
            version  = $version
            notes    = "See the full changelog at https://github.com/$repo/releases/tag/$tag"
            pub_date = $pubDate
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = $signature
                url       = $updateUrl
              }
            }
          }

          $manifest | ConvertTo-Json -Depth 5 |
            Out-File -FilePath "updater.json" -Encoding utf8NoBOM
          gh release upload $tag "updater.json" --clobber
          Write-Host "Uploaded updater.json"

          # ── Remove raw Tauri-generated assets (keep only our curated files) ──
          $toDelete = @(
            $nsisExe.Name,
            $sigFile.Name,
            "THC_Fireworks_Portable.zip",
            "godaddy-bridge.zip"
          )

          foreach ($asset in $toDelete) {
            Write-Host "Removing asset (if present): $asset"
            gh release delete-asset $tag $asset --yes 2>$null
          }

          Write-Host ""
          Write-Host "Release curation complete."
          Write-Host "  THC_Fireworks_Setup.exe    -- NSIS installer (auto-updater)"
          Write-Host "  THC_Fireworks_Portable.exe -- portable exe   (USB / no-install)"
          Write-Host "  updater.json               -- updater manifest"
