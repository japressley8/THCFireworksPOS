name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build and Sign Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSPHRASE: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSPHRASE }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'THC Fireworks v__VERSION__'
          releaseBody: 'See the full changelog below.'
          releaseDraft: false
          prerelease: ${{ contains(github.ref, '-pre') || contains(github.ref, '-rc') }}
          createUpdaterArtifacts: true

      # -------------------------------------------------------------------------
      # Asset Curation
      # Renames the Tauri-generated signed NSIS update payload to THC_Fireworks.zip,
      # generates updater.json, and removes all unwanted release assets.
      # Final release will contain exactly 2 files:
      #   THC_Fireworks.zip  - signed NSIS update payload (downloaded by Tauri updater)
      #   updater.json       - Tauri updater manifest (endpoint in tauri.conf.json)
      # -------------------------------------------------------------------------
      - name: Curate Release Assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          $tag     = "${{ github.ref_name }}"
          $repo    = "${{ github.repository }}"

          # Locate build artifacts produced by tauri-action with createUpdaterArtifacts:true
          $nsisZip = Get-ChildItem -Path src-tauri/target/release/bundle `
                       -Filter "*.nsis.zip" -Recurse | Select-Object -First 1
          $sigFile  = Get-ChildItem -Path src-tauri/target/release/bundle `
                       -Filter "*.nsis.zip.sig" -Recurse | Select-Object -First 1
          $nsisExe  = Get-ChildItem -Path src-tauri/target/release/bundle `
                       -Filter "*-setup.exe" -Recurse | Select-Object -First 1

          if ($null -eq $nsisZip -or $null -eq $sigFile) {
            Write-Error "ERROR: Could not find .nsis.zip or .nsis.zip.sig in the build output."
            exit 1
          }

          Write-Host "NSIS zip : $($nsisZip.FullName)"
          Write-Host "Sig file : $($sigFile.FullName)"

          # Read the detached minisign signature
          $signature = (Get-Content -Path $sigFile.FullName -Raw).Trim()

          # Upload THC_Fireworks.zip (renamed, signed NSIS update payload)
          Copy-Item -Path $nsisZip.FullName -Destination "THC_Fireworks.zip"
          gh release upload $tag "THC_Fireworks.zip" --clobber
          Write-Host "Uploaded THC_Fireworks.zip"

          # Generate updater.json
          # Forward-compatible schema: add platform keys when macOS/Linux targets are added
          $pubDate   = (Get-Date -AsUTC -Format "yyyy-MM-ddTHH:mm:ssZ")
          $updateUrl = "https://github.com/$repo/releases/download/$tag/THC_Fireworks.zip"

          $manifest = [ordered]@{
            version  = $version
            notes    = "See the full changelog at https://github.com/$repo/releases/tag/$tag"
            pub_date = $pubDate
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = $signature
                url       = $updateUrl
              }
            }
          }

          $manifest | ConvertTo-Json -Depth 5 | `
            Out-File -FilePath "updater.json" -Encoding utf8NoBOM
          gh release upload $tag "updater.json" --clobber
          Write-Host "Uploaded updater.json"

          # Delete all unwanted release assets
          $toDelete = @()
          if ($nsisExe) {
            $toDelete += $nsisExe.Name
            $toDelete += "$($nsisExe.Name).sig"
          }
          $toDelete += $nsisZip.Name
          $toDelete += $sigFile.Name
          $toDelete += "THC_Fireworks_Portable.exe"
          $toDelete += "THC_Fireworks_Portable.zip"
          $toDelete += "godaddy-bridge.zip"

          foreach ($asset in $toDelete) {
            Write-Host "Removing asset (if present): $asset"
            gh release delete-asset $tag $asset --yes 2>$null
          }

          Write-Host "Release curation complete. Final assets: THC_Fireworks.zip, updater.json"
